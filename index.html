<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Main calculator container -->
    <div class="calculator">
      <!-- Display area for input and result -->
      <input type="text" class="calculator-screen" id="screen" disabled />

      <!-- Calculator buttons -->
      <div class="calculator-keys">
        <!-- Memory functions -->
        <button class="memory" data-action="MC">MC</button>
        <button class="memory" data-action="MR">MR</button>
        <button class="memory" data-action="M+">M+</button>
        <button class="memory" data-action="M-">M-</button>

        <!-- Clear and advanced operations -->
        <button data-action="clear">C</button>
        <button data-action="sqrt">√</button>
        <button data-action="percent">%</button>
        <button data-action="divide">÷</button>

        <!-- Numbers and operations -->
        <button data-number="7">7</button>
        <button data-number="8">8</button>
        <button data-number="9">9</button>
        <button data-action="multiply">×</button>

        <button data-number="4">4</button>
        <button data-number="5">5</button>
        <button data-number="6">6</button>
        <button data-action="subtract">−</button>

        <button data-number="1">1</button>
        <button data-number="2">2</button>
        <button data-number="3">3</button>
        <button data-action="add">+</button>

        <button data-number="0">0</button>
        <button data-number=".">.</button>
        <button data-action="power">xʸ</button>
        <button data-action="equals">=</button>
      </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="assets/js/script.js"></script>
  </body>
</html>
